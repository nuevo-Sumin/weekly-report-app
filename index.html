<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주간업무보고 생성기</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f4f7f6; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 1.4rem; color: #2c3e50; margin-bottom: 20px; border-left: 5px solid var(--primary-color); padding-left: 12px; }
        .upload-box { background: #f9f9f9; padding: 25px; border: 2px dashed #cbd5e0; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #cbd5e0; font-family: inherit; margin-left: 10px; }
        input[type="file"] { margin-bottom: 15px; }
        button { padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        .btn-main { background-color: var(--primary-color); color: white; width: 100%; font-size: 1rem; }
        .btn-main:hover { background-color: #357abd; }
        #resultArea { width: 100%; height: 600px; margin-top: 20px; padding: 15px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; background-color: #fafafa; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-copy { background-color: #27ae60; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 주간업무보고 자동 생성 (2026)</h1>
    
    <div class="upload-box">
        <div class="input-group">
            <label><strong>출력 옵션:</strong></label>
            <select id="pmOption">
                <option value="include">사업관리 포함</option>
                <option value="exclude">사업관리 제외</option>
            </select>
        </div>
        <input type="file" id="csvFile" accept=".csv"><br>
        <button class="btn-main" onclick="processFile()">보고서 생성하기</button>
    </div>

    <textarea id="resultArea" readonly placeholder="CSV 파일을 업로드하면 설정된 옵션에 맞춰 보고서가 생성됩니다."></textarea>
    
    <button class="btn-copy" onclick="copyToClipboard()">📋 결과 복사하기</button>
</div>

<script>
    function parseDate(dateStr) {
        if (!dateStr) return null;
        let cleaned = dateStr.replace('오전', 'AM').replace('오후', 'PM');
        let d = new Date(cleaned);
        if (isNaN(d.getTime())) {
            const match = dateStr.match(/\d{4}-\d{2}-\d{2}/);
            if (match) d = new Date(match[0]);
        }
        return isNaN(d.getTime()) ? null : d;
    }

    function parseCsv(text) {
        const rows = [];
        let cur = [], field = '', inQ = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i], n = text[i+1];
            if (inQ) {
                if (c === '"' && n === '"') { field += '"'; i++; }
                else if (c === '"') inQ = false;
                else field += c;
            } else {
                if (c === '"') inQ = true;
                else if (c === ',') { cur.push(field.trim()); field = ''; }
                else if (c === '\n' || c === '\r') {
                    if (field || cur.length > 0) { cur.push(field.trim()); rows.push(cur); field = ''; cur = []; }
                    if (c === '\r' && n === '\n') i++;
                } else field += c;
            }
        }
        if (field || cur.length > 0) { cur.push(field.trim()); rows.push(cur); }
        return rows;
    }

    function processFile() {
        const fileInput = document.getElementById('csvFile');
        if (!fileInput.files.length) return alert('CSV 파일을 선택해주세요.');

        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = parseCsv(e.target.result);
            if (rows.length < 2) return alert('분석할 데이터가 없습니다.');

            const headers = rows[0];
            const getIdx = (name) => headers.findIndex(h => h.trim() === name);

            const idxMap = {
                id: getIdx('#'),
                parent: getIdx('상위 일감'),
                category: getIdx('범주'),
                status: getIdx('상태'),
                title: getIdx('제목'),
                change: getIdx('변경'),
                progress: getIdx('진척도')
            };

            if (idxMap.id === -1 || idxMap.status === -1 || idxMap.title === -1) {
                return alert('CSV 헤더 구성이 올바르지 않습니다.');
            }

            const tasks = rows.slice(1).map(row => {
                if (row.length < headers.length * 0.5) return null;

                const id = row[idxMap.id];
                const parentField = idxMap.parent !== -1 ? (row[idxMap.parent] || "") : "";
                const category = idxMap.category !== -1 ? (row[idxMap.category] || "미분류") : "미분류";
                let   status = row[idxMap.status];
                const title = row[idxMap.title];
                const modDate = idxMap.change !== -1 ? parseDate(row[idxMap.change]) : null;
                let   progress = idxMap.progress !== -1 ? (parseInt(row[idxMap.progress]) || 0) : 0;
                
                if (progress >= 100) {
                    status = '완료';
                    progress = 100;
                }

                const parentMatch = parentField.match(/#?(\d+)/);
                const hasParent = !!parentMatch;
                const groupId = hasParent ? parentMatch[1] : id;

                return { id, category, status, title, modDate, progress, groupId, isRealGroup: hasParent };
            }).filter(t => t !== null && t.id);

            generateWeeklyReport(tasks);
        };

        reader.readAsText(fileInput.files[0], 'EUC-KR');
    }

    function generateWeeklyReport(tasks) {
        const pmOption = document.getElementById('pmOption').value;
        
        const today = new Date();
        const day = today.getDay();
        const diffToMonday = today.getDate() - (day === 0 ? 6 : day - 1);
        
        const monday = new Date(today);
        monday.setDate(diffToMonday);
        monday.setHours(0,0,0,0);

        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23,59,59,999);

        const reportTasks = tasks.filter(t => {
            if (t.status === '신규' || t.status === '진행중') return true;
            if (t.status === '완료') {
                return t.modDate && t.modDate >= monday && t.modDate <= sunday;
            }
            return false;
        });

        reportTasks.sort((a, b) => a.title.localeCompare(b.title, 'ko'));

        const hierarchy = {};
        reportTasks.forEach(t => {
            if (!hierarchy[t.category]) hierarchy[t.category] = {};
            if (!hierarchy[t.category][t.groupId]) {
                hierarchy[t.category][t.groupId] = { items: [], pSum: 0, isGroup: t.isRealGroup };
            }
            hierarchy[t.category][t.groupId].items.push(t);
            hierarchy[t.category][t.groupId].pSum += t.progress;
        });

        // 출력 생성
        let output = `## 주간업무보고 (${monday.toLocaleDateString()} ~ ${sunday.toLocaleDateString()})\n\n`;
        
        if (pmOption === 'include') {
            output += `(1) 사업관리\n   - 주간업무보고 작성\n   - 기타내용 작성하세요 ... \n\n`;
            output += `(2) 수행\n`;
        } else {
            output += `(1) 수행\n`;
        }

        output += `   - 신규: ${reportTasks.filter(t => t.status === '신규').length}건\n`;
        output += `   - 진행중: ${reportTasks.filter(t => t.status === '진행중').length}건\n`;
        output += `   - 완료(금주): ${reportTasks.filter(t => t.status === '완료').length}건\n\n`;
        output += `[업무 세부 내역]\n`;

        Object.keys(hierarchy).sort().forEach(cat => {
            output += `▶ ${cat}\n`;
            const groups = hierarchy[cat];
            
            Object.keys(groups).sort((a, b) => a - b).forEach(gid => {
                const g = groups[gid];
                if (g.isGroup) {
                    const avg = Math.floor(g.pSum / g.items.length);
                    output += `  - 상위일감 #${gid} (평균 진척도 ${avg}%)\n`;
                } else {
                    output += `  - #${gid}\n`;
                }
                g.items.forEach(t => {
                    let progressText = '';

                    if (t.status !== '완료') {
                        progressText = ` (${t.progress}%)`;
                    }

                    output += `      . [${t.status}] ${t.title}${progressText}\n`;
                    // output += `      . [${t.status}] ${t.title} (${t.progress}%)\n`;
                });
            });
            output += `\n`;
        });

        const totalCompleted = tasks.filter(t => t.status === '완료').length;
        output += `※ 전체 누적 완료건(현재 기준): ${totalCompleted}건\n`;
        
        document.getElementById('resultArea').value = output;
    }

    function copyToClipboard() {
        const area = document.getElementById('resultArea');
        if (!area.value) return;
        area.select();
        document.execCommand('copy');
        alert('보고서 내용이 클립보드에 복사되었습니다.');
    }
</script>
</body>
</html>
